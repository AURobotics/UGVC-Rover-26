[workspace]
name = "console"
version = "0.1.0"
readme = "README.md"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64"]
channels = ["https://prefix.dev/robostack-jazzy", "https://prefix.dev/conda-forge"]

[dependencies]
python = ">=3.12.13,<3.13"
pyside6 = ">=6.10.2,<7"
ros-jazzy-ros-base = ">=0.11.0,<0.12"
ros-jazzy-std-msgs = ">=5.3.6,<6"
ros-jazzy-rclpy = ">=7.1.9,<8"
ros-jazzy-cv-bridge = ">=4.1.0,<5"
ros-jazzy-joy = ">=3.3.0,<4"
cmake = ">=4.4.0,<5"
pkg-config = ">=0.29.2,<0.30"
colcon-common-extensions = ">=0.3.0,<0.4"
make = ">=4.4.1,<5"
ninja = ">=1.13.2,<2"
rosdep = ">=0.26.0,<0.27"
compilers = ">=1.11.0,<2"
ros-jazzy-tf-transformations = ">=1.1.1,<2"

[tasks]
vid_test = "python src/testing/video_stream_node.py"
joy_echo = "ros2 topic echo /joy sensor_msgs/msg/Joy"
joy_monitor = "python src/testing/joy_monitor.py"
tel_test = "python src/testing/test_telemetry.py"

[pypi-dependencies]
console = { path = ".", editable = true }
pyglet = ">=2.1.14, <3"

[target.win-64.activation]
scripts = ["install\\setup.bat"]
