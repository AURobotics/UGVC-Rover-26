road_detector:
  ros__parameters:
    camera_topic: "/camera/image_raw"
    camera_info_topic: "/camera/camera_info"
    output_pointcloud_topic: "/road_detector/pointcloud"
    output_image_topic: "/road_detector/debug/lane_mask"
    output_bev_topic: "/road_detector/debug/bev_image"
    output_costmap_topic: "/road_detector/costmap"
    
    # Camera calibration
    camera_height: 1.43
    pitch_deg: -50.0
    fx: 1000.0
    fy: 1000.0
    cx: 960.0
    cy: 540.0
    
    # Detection parameters
    min_radius: 10
    max_radius: 200
    
    # Debug Options
    publish_debug_images: true
    publish_performance_stats: false