[workspace]
name = "rover_ws"
version = "0.1.0"
readme = "README.md"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64"]
channels = [
    "https://prefix.dev/robostack-jazzy",
    "https://prefix.dev/conda-forge",
]

[tasks]
# Launch RViz2
rviz = "rviz2"

# to test RViz2 run tb3_robot and tb3_rviz in separate terminals
tb3_robot = "ros2 launch turtlebot3_bringup robot.launch.py"
tb3_rviz = "ros2 launch turtlebot3_bringup rviz2.launch.py"

[target.linux.tasks] # Gazebo only works on Linux
tb3_empty = "ros2 launch turtlebot3_gazebo empty_world.launch.py" # Gazebo + TurtleBot3 Burger in an empty world
tb3_world = "ros2 launch turtlebot3_gazebo turtlebot3_world.launch.py" # Gazebo + TurtleBot3 Burger in a custom world
tb3_teleop = "ros2 run turtlebot3_teleop teleop_keyboard" # Launch the keyboard teleoperation node 

[dependencies]
python = ">=3.12,<3.13"
ros-jazzy-turtlesim = ">=1.8.3,<2"
ros-jazzy-desktop = ">=0.11.0,<0.12"
compilers = ">=1.11.0,<2"
cmake = "3.31.*"
pkg-config = ">=0.29.2,<0.30"
make = ">=4.4.1,<5"
ninja = ">=1.13.2,<2"
rosdep = ">=0.26.0,<0.27"
colcon-common-extensions = ">=0.3.0,<0.4"
ros-jazzy-ros-gz = ">=1.0.19,<2"
ros-jazzy-ros-gz-sim = ">=1.0.19,<2"
ros-jazzy-navigation2 = ">=1.3.11,<2"
ros-jazzy-nav2-bringup = ">=1.3.11,<2"
opencv = ">=4.12.0,<5"
ros-jazzy-ros2cli = ">=0.32.8,<0.33"
ros-jazzy-ros2pkg = ">=0.32.8,<0.33"
ros-jazzy-cv-bridge = ">=4.1.0,<5"
ros-jazzy-gz-ros2-control = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"

# --- Added TurtleBot3 Dependencies ---
ros-jazzy-turtlebot3 = "*"
ros-jazzy-turtlebot3-simulations = "*"
ros-jazzy-turtlebot3-description = ">=2.3.6,<3"

[target.win-64.activation]
scripts = ["install\\setup.bat"]

# Use a standard table block for environment variables
[activation.env]
TURTLEBOT3_MODEL = "burger"
LDS_MODEL = "LDS-01"

[target.linux.dependencies]
libgl-devel = "*"
