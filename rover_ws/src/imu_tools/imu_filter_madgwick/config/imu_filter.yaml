imu_filter:
  ros__parameters:
    stateless: false
    use_mag: true
    publish_tf: false #?
    reverse_tf: false
    fixed_frame: "odom"
    constant_dt: 0.0
    publish_debug_topics: false 
    world_frame: "ENU"
    gain: 0.2
    zeta: -0.0001
    mag_bias_x: 0.0
    mag_bias_y: 0.0
    mag_bias_z: 0.0
    orientation_stddev: 0.0
    remove_gravity_vector: true
