%YAML 1.2
---
launch:
  - node:
      pkg: "localization"
      exec: "odom_node"
      name: "odom_node"
      param:
        - name: "wheel_base"
          value: 0.16
        - name: "wheel_radius"
          value: 0.033


  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "local_ekf_node"
      param:
      - from: "params/ekf_local_config.yaml"  # Load from file

