road_detector:
  ros__parameters:
    camera_topic: "/camera/image_raw"
    camera_info_topic: "/camera/camera_info"
    output_pointcloud_topic: "/road_detector/pointcloud"
    output_lane_mask_topic: "/road_detector/debug/lane_mask"
    output_bev_topic: "/road_detector/debug/bev_image"
    output_costmap_topic: "/road_detector/stats"
    
    # Camera calibration
    camera_height: 1.43
    pitch_deg: -50.0
    yaw_deg: 0.0
    roll_deg: 0.0
    fx: 1000.0
    fy: 1000.0
    cx: 960.0
    cy: 540.0
    dist_coeffs: [0,0,0,0,0]
    
    # Detection parameters
    min_radius: 10
    max_radius: 200
    
    # Debug Options
    publish_debug_images: True
    publish_performance_stats: True

    # Point cloud parameters
    max_points_per_cloud: 10000
