pointcloud_logger:
  ros__parameters:
    # Topic to subscribe to — must match road_detector's output_pointcloud_topic
    # Note: road_detector_launch.py remaps this to /local_costmap/obstacle_points,
    # so update here if using that launch file.
    pointcloud_topic: "/road_detector/pointcloud"

    # Output file path — directory will be created if it does not exist
    output_file: "/tmp/pointcloud_log.txt"

    # Maximum number of XYZ points written per message (0 = log all points)
    max_points_to_log: 50

    # Log every Nth received message (1 = log every message)
    log_every_n: 1

    # Flush the file to disk every Nth logged message
    flush_every_n: 5
