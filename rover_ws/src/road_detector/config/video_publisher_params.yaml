video_publisher:
  ros__parameters:
    # Path to the video file to stream — REQUIRED, update before running
    video_path: "D:/My_Files/Work/AU-Robotics/Rover_2026/Code/UGVC-Rover-26/rover_ws/data/raw/test_lane.mp4"

    # Topic to publish frames on — must match road_detector's camera_topic
    image_topic: "/camera/image_raw"

    # frame_id written into every Image header
    frame_id: "camera"

    # Publishing frequency in Hz (does not need to match native video FPS)
    publish_rate: 30.0

    # Loop the video when it reaches the end
    loop: true

    # Frame index to start from (0 = beginning)
    start_frame: 0
