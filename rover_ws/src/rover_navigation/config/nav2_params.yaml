
# =============================================================================
#  LOCAL COSTMAP
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time:             True
      global_frame:             odom
      robot_base_frame:         base_footprint
      update_frequency:         10.0
      publish_frequency:        10.0    # [DBG-3] was 5.0
      always_send_full_costmap: true    # [DBG-2] full grid to RViz every cycle
      rolling_window:           true
      width:                    10
      height:                   10
      resolution:               0.05
      robot_radius:             0.20
      transform_tolerance:      2.0

      plugins:
        - obstacle_layer    # real LIDAR obstacles
        - lane_layer        # camera virtual walls
        - inflation_layer

      # ---- Real obstacles (LIDAR) ----------------------------------------
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range:  8.0
          obstacle_min_range:  0.0
          raytrace_max_range:  8.5
          raytrace_min_range:  0.0

      # ---- Lane walls (camera virtual walls) — LOCAL: clearing ON ---------
      lane_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: virtual_walls
        virtual_walls:
          topic: /road_detector/pointcloud
          data_type: "PointCloud2"
          min_obstacle_height: -5.0
          max_obstacle_height:  5.0
          obstacle_max_range:   5.0
          obstacle_min_range:   0.0
          raytrace_max_range:   5.5
          raytrace_min_range:   0.0
          clearing: True        # [FIX-2] LOCAL: always refresh from live camera
          marking: True
          expected_update_rate: 5.0

      # ---- Inflation [DBG-1] — raised for RViz debug ----------------------
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.09 # [DBG-1] was 0.07 — raised for RViz visibility

  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

# =============================================================================
#  GLOBAL COSTMAP
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time:         True
      global_frame:         map
      robot_base_frame:     base_footprint
      update_frequency:     2.0
      publish_frequency:    1.0
      rolling_window:       true
      width:                20
      height:               20
      resolution:           0.05
      robot_radius:         0.20
      transform_tolerance:  1.0
      always_send_full_costmap: true

      plugins:
        - obstacle_layer
        - lane_layer
        - inflation_layer
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.15    # ← must be > 0.206
        cost_scaling_factor: 3.0


      # ---- Real obstacles (LIDAR) ----------------------------------------
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True # was false
          marking: True
          data_type: "LaserScan"
          obstacle_max_range:  8.0
          obstacle_min_range:  2.0 # was 0.0
          raytrace_max_range:  8.5
          raytrace_min_range:  0.0

      # ---- Lane walls (camera virtual walls) — GLOBAL: clearing OFF -------
      # [FIX-1] These walls NEVER clear. They accumulate as the robot drives,
      # building a permanent lane corridor. NavFn is physically unable to
      # plan a path that exits the lane.
      lane_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: virtual_walls
        virtual_walls:
          topic: /road_detector/pointcloud
          data_type: "PointCloud2"
          min_obstacle_height: -5.0
          max_obstacle_height:  5.0
          obstacle_max_range:   5.0
          obstacle_min_range:   0.0
          raytrace_max_range:   5.5
          raytrace_min_range:   0.0
          clearing: False       # [FIX-1] GLOBAL: walls persist — no clearing ever
          marking: True
          expected_update_rate: 5.0

      

# =============================================================================
#  CONTROLLER SERVER  (DWB)
# =============================================================================
controller_server:
  ros__parameters:
    use_sim_time:                  True
    controller_frequency:          10.0
    min_x_velocity_threshold:      0.001
    min_y_velocity_threshold:      0.001
    min_theta_velocity_threshold:  0.001
    failure_tolerance:             0.3
    progress_checker_plugin:       "progress_checker"
    goal_checker_plugins:          ["goal_checker"]
    controller_plugins:            ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance:  35.0

    goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:  0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True

      min_vel_x:       0.0
      min_vel_y:       0.0
      max_vel_x:       0.22
      max_vel_y:       0.0
      max_vel_theta:   1.8
      min_speed_xy:    0.0
      max_speed_xy:    0.35
      min_speed_theta: 0.0
      acc_lim_x:       1.0
      acc_lim_theta:   3.2
      decel_lim_x:    -2.5
      decel_lim_theta: -3.2

      vx_samples:           20
      vy_samples:           0
      vtheta_samples:       40
      sim_time:             3.0
      linear_granularity:   0.05
      angular_granularity:  0.025
      transform_tolerance:  0.3
      xy_goal_tolerance:    0.25
      trans_stopped_velocity: 0.25

      critics:
        - "RotateToGoalCritic"
        - "OscillationCritic"
        - "BaseObstacleCritic"
        - "GoalAlignCritic"
        - "PathAlignCritic"
        - "PathDistCritic"
        - "GoalDistCritic"

      BaseObstacleCritic:
        plugin: "dwb_critics::BaseObstacleCritic"
        scale: 12.0
        sum_scores: false

      GoalAlignCritic:
        plugin: "dwb_critics::GoalAlignCritic"
        scale: 20.0
        forward_point_distance: 0.1
        stopped_rot_tolerance:  0.1

      PathAlignCritic:
        plugin: "dwb_critics::PathAlignCritic"
        scale: 14.0 # lowereddd was 24.0
        forward_point_distance: 0.1

      PathDistCritic:
        plugin: "dwb_critics::PathDistCritic"
        scale: 14.0 # lowereddd was 24.0

      GoalDistCritic:
        plugin: "dwb_critics::GoalDistCritic"
        scale: 20.0

      RotateToGoalCritic:
        plugin: "dwb_critics::RotateToGoalCritic"
        scale: 16.0 # lowered it was 32!!!!!
        slowing_factor: 5.0
        lookahead_time: -1.0

      OscillationCritic:
        plugin: "dwb_critics::OscillationCritic"
        scale: 1.0
        oscillation_reset_dist:  0.05
        oscillation_reset_angle: 0.2

  controller_server_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# =============================================================================
#  PLANNER SERVER
# =============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance:     0.25        # [FIX-4] was 0.5
      use_astar:     true
      allow_unknown: false       # [FIX-3]

  planner_server_rclcpp_node:
    ros__parameters:
      use_sim_time: True

# =============================================================================
#  SMOOTHER SERVER
# =============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance:     1.0e-10
      max_its:       1000
      do_refinement: True

# =============================================================================
#  BEHAVIOR SERVER
# =============================================================================
behavior_server:
  ros__parameters:
    use_sim_time:       True
    local_frame:        odom
    global_frame:       map
    robot_base_frame:   base_footprint
    transform_tolerance: 0.1
    behavior_plugins:
      - "spin"
      - "backup"
      - "drive_on_heading"
      - "wait"
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"

# =============================================================================
#  BT NAVIGATOR
# =============================================================================

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

# =============================================================================
#  WAYPOINT FOLLOWER
# =============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time:  True
    loop_rate:     20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# =============================================================================
#  VELOCITY SMOOTHER
# =============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time:        True
    smoothing_frequency: 20.0
    scale_velocities:    false
    feedback:            "OPEN_LOOP"
    max_velocity:        [0.35, 0.0, 1.0]
    min_velocity:        [-0.35, 0.0, -1.0]
    max_accel:           [2.0, 0.0, 3.0]
    max_decel:           [-2.5, 0.0, -3.2]
    odom_topic:          "odom"
    odom_duration:       0.1
    deadband_velocity:   [0.0, 0.0, 0.0]
    velocity_timeout:    1.0

# =============================================================================
#  LIFECYCLE MANAGER
# =============================================================================
lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart:    True
    node_names:
      - slam_toolbox
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother